# workspace.yaml — Agentic Workspace Configuration
#
# Single source of truth for your project.
# The agent reads this to understand your services, environment, and conventions.
#
# To get started:
#   1. Update project name and ticket prefix
#   2. Add your service repos as git submodules at the workspace root
#   3. List them below with build/test/deploy commands
#   4. Run `make init`

project:
  name: "my-project"                    # Your project/product name
  description: "Multi-service platform" # Brief description
  ticket_prefix: "PROJ"                 # Jira/GitHub prefix (e.g., PROJ-1234)

# ---------------------------------------------------------------------------
# Services — git submodules at the workspace root
# ---------------------------------------------------------------------------
# Each service is a git submodule at the workspace root.
# Add with: git submodule add <repo-url> <name>
#
# Fields:
#   name:             Service identifier
#   path:             Relative to workspace root (usually same as name)
#   language:         python | node | go | java | rust | dotnet | ruby | other
#   framework:        (optional) fastapi, express, gin, spring, etc.
#   build:            Command to install dependencies
#   test:             Command to run tests
#   lint:             Command to run linter
#   health_endpoint:  Path for health checks (e.g., /healthz)
#   namespace:        Kubernetes namespace (if applicable)
#   port:             Service port
#   description:      One-line description

services: []
  # Example:
  #
  # - name: backend-api
  #   path: backend-api
  #   language: python
  #   framework: fastapi
  #   build: "poetry install"
  #   test: "poetry run pytest tests/ -v"
  #   lint: "poetry run ruff check ."
  #   health_endpoint: "/healthz"
  #   namespace: "backend"
  #   port: 8080
  #   description: "Core API service"
  #
  # - name: frontend
  #   path: frontend
  #   language: node
  #   framework: react
  #   build: "npm install"
  #   test: "npm test"
  #   lint: "npm run lint"
  #   health_endpoint: "/"
  #   namespace: "frontend"
  #   port: 3000
  #   description: "Web UI"

# ---------------------------------------------------------------------------
# Infrastructure (optional — describe what your services depend on)
# ---------------------------------------------------------------------------
# Helps the agent understand dependencies when debugging.

# infrastructure:
#   postgresql:
#     namespace: shared-services
#     service: postgres-cluster-rw
#     port: 5432
#   rabbitmq:
#     namespace: rabbitmq
#     service: rabbitmq
#     port: 5672

# ---------------------------------------------------------------------------
# Environment — how your services run locally
# ---------------------------------------------------------------------------

environment:
  type: kubernetes                       # kubernetes | docker-compose | custom
  kubernetes:
    context: "docker-desktop"            # kubectl context name

  tests:
    quick: "make test-smoke"             # Fast sanity check (<30s)
    full: "make test-full"               # Comprehensive test suite
    smoke: "make test-smoke"             # Endpoint verification
    api: "make test-api"                 # API integration tests
    browser: "make test-browser"         # UI/Playwright tests
    contract: "make test-contract"       # Cross-service contract tests
    e2e: "make test-e2e"                 # End-to-end workflow tests
    security: "make test-security"       # Security tests

# ---------------------------------------------------------------------------
# Ticketing — where your work items come from
# ---------------------------------------------------------------------------
# Auto-detected from available MCP servers (Jira, GitHub, etc.)

ticketing:
  provider: auto                         # auto | jira | github | none
  # jira:
  #   project: "PROJ"
  # github:
  #   owner: "org"
  #   repo: "project"

# ---------------------------------------------------------------------------
# Gates — human approval checkpoints
# ---------------------------------------------------------------------------
# The ONLY mandatory interaction points.
# Between gates, the agent runs autonomously.

gates:
  plan_approval: true                    # Ask before implementing
  pr_creation: true                      # Ask before opening PR

# ---------------------------------------------------------------------------
# Risk triggers — conditions that interrupt autonomous execution
# ---------------------------------------------------------------------------

risk_triggers:
  multi_service_change: true             # >1 repo modified
  schema_migration: true                 # DB schema files changed
  dependency_bump: true                  # Lock files changed
  large_diff: true                       # >500 LOC changed
  large_diff_threshold: 500
  test_failures: true                    # Tests fail after retries
  scope_drift: true                      # Implementation ≠ plan
  missing_repro: true                    # Can't reproduce issue

# ---------------------------------------------------------------------------
# Conventions — coding standards the agent follows
# ---------------------------------------------------------------------------

conventions:
  branch_prefix_bug: "fix/"              # fix/PROJ-1234
  branch_prefix_feature: "feature/"      # feature/PROJ-1234
  commit_format: "conventional"          # conventional | simple
  max_review_cycles: 2                   # Escalate after N revision rounds
