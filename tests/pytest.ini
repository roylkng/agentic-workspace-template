[pytest]
# Agentic Workspace — Test Configuration
#
# Test types are organized by marker. Use these to run specific suites:
#   pytest -m smoke      Quick health checks (<30s)
#   pytest -m api        API endpoint tests
#   pytest -m browser    Browser/UI tests (requires Playwright)
#   pytest -m contract   Cross-service contract tests
#   pytest -m e2e        End-to-end workflow tests
#   pytest -m security   Security tests
#   pytest -m slow       Long-running tests (excluded by default)

markers =
    smoke: Quick health endpoint checks
    api: API endpoint integration tests
    browser: Browser-based UI tests (Playwright)
    contract: Cross-service API contract tests
    e2e: End-to-end workflow tests
    security: Security and auth tests
    slow: Long-running tests (opt-in with --slow)

testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short -m "not slow"
asyncio_mode = auto
